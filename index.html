<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vNAS Hub | Norwegian Virtual Airline System</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --nas-red: #e71c2a;
            --nas-blue: #15273f;
            --nas-grey: #f2f2f2;
            --nas-text: #2d2d2d;
            --sidebar-width: 280px;
            --transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', 'Segoe UI', sans-serif; }
        
        body { 
            background-color: #ffffff; 
            color: var(--nas-text); 
            overflow-x: hidden;
            opacity: 0;
            animation: fadeIn 0.8s forwards;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* --- LOGIN SCREEN --- */
        #loginSection {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(rgba(21, 39, 63, 0.05), rgba(21, 39, 63, 0.05)), url('https://www.norwegian.com/globalassets/ip-images/hero-images/b737_hero.jpg');
            background-size: cover;
            background-position: center;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.98);
            padding: 4rem 3rem;
            border-radius: 2px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
            text-align: center;
            width: 100%;
            max-width: 450px;
            border-top: 8px solid var(--nas-red);
            animation: slideUp 0.6s ease-out;
        }

        .logo-text { font-size: 2.2rem; font-weight: 800; letter-spacing: -1px; margin-bottom: 0.5rem; color: var(--nas-blue); }
        .logo-text span { color: var(--nas-red); }

        .discord-btn {
            background-color: #5865F2;
            color: white;
            padding: 16px;
            border-radius: 4px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            cursor: pointer;
            border: none;
            width: 100%;
            transition: var(--transition);
            margin-top: 2rem;
            text-decoration: none;
        }

        .discord-btn:hover { background-color: #4752c4; transform: translateY(-3px); box-shadow: 0 5px 15px rgba(88, 101, 242, 0.4); }

        /* --- DASHBOARD LAYOUT --- */
        #dashboardSection { 
            display: none; 
            grid-template-columns: var(--sidebar-width) 1fr; 
            min-height: 100vh; 
        }

        /* Sidebar */
        nav.sidebar { 
            background-color: white; 
            border-right: 1px solid #eee;
            padding: 2.5rem 1.5rem; 
            display: flex; 
            flex-direction: column;
            z-index: 100;
        }

        .nav-links { list-style: none; flex-grow: 1; margin-top: 2rem; }
        .nav-links a { 
            color: #666; 
            text-decoration: none; 
            padding: 14px 18px; 
            display: flex; 
            align-items: center; 
            gap: 15px; 
            border-radius: 6px; 
            margin-bottom: 8px;
            font-weight: 500;
            transition: var(--transition);
        }

        .nav-links a:hover, .nav-links a.active { 
            background: var(--nas-grey); 
            color: var(--nas-red); 
        }

        /* Content Area */
        .content { padding: 3rem; max-width: 1300px; margin: 0 auto; width: 100%; }
        
        .header-bar { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 3rem;
            animation: fadeIn 1s;
        }

        .profile-snip { 
            display: flex; 
            align-items: center; 
            gap: 15px; 
            padding: 10px 20px;
            border-radius: 4px;
            background: var(--nas-grey);
        }

        .avatar { width: 40px; height: 40px; border-radius: 50%; border: 2px solid white; }

        /* Functional Components */
        .dashboard-grid { display: grid; grid-template-columns: 1.5fr 1fr; gap: 30px; }
        
        .card { 
            background: white; 
            border: 1px solid #eee;
            padding: 2rem; 
            margin-bottom: 30px;
            transition: var(--transition);
            animation: slideUp 0.6s ease-out;
        }
        .card:hover { border-color: #ccc; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }

        .card-title { 
            font-size: 0.9rem; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            font-weight: 700; 
            margin-bottom: 2rem; 
            color: var(--nas-blue);
            display: flex;
            justify-content: space-between;
        }

        .card-title::after { content: ''; width: 40px; height: 3px; background: var(--nas-red); display: block; margin-top: 8px; }

        /* Form Styling */
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 15px; }
        .input-group label { display: block; font-size: 0.75rem; font-weight: 700; color: #888; margin-bottom: 8px; text-transform: uppercase; }
        input { 
            width: 100%; padding: 14px; border: 1px solid #ddd; border-radius: 4px; outline: none; font-size: 1rem;
            transition: var(--transition);
        }
        input:focus { border-color: var(--nas-red); background: #fffafa; }

        .btn-nas { 
            background: var(--nas-red); 
            color: white; 
            border: none; 
            padding: 16px 30px; 
            font-weight: 700; 
            cursor: pointer; 
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: var(--transition);
            width: 100%;
        }
        .btn-nas:hover { background: var(--nas-blue); letter-spacing: 2px; }

        /* Table */
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 15px; background: var(--nas-grey); font-size: 0.7rem; text-transform: uppercase; color: #666; }
        td { padding: 18px 15px; border-bottom: 1px solid #eee; font-size: 0.9rem; }
        
        .status-badge { padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; background: #e8f5e9; color: #2e7d32; }

        @media (max-width: 1000px) { 
            #dashboardSection { grid-template-columns: 1fr; } 
            .sidebar { display: none; }
            .dashboard-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div id="loginSection">
        <div class="login-card">
            <div class="logo-text">vNAS <span>Hub</span></div>
            <p style="color: #666; font-weight: 400;">Virtual Norwegian Airline System</p>
            <button class="discord-btn" onclick="loginWithDiscord()">
                <i class="fab fa-discord"></i> AUTHENTICATE WITH DISCORD
            </button>
            <p style="margin-top: 2rem; font-size: 0.7rem; color: #aaa;">Secure OAuth2 Dashboard Access</p>
        </div>
    </div>

    <div id="dashboardSection">
        <nav class="sidebar">
            <div class="logo-text" style="font-size: 1.5rem;">vNAS <span>Hub</span></div>
            <ul class="nav-links">
                <li><a href="#" class="active"><i class="fas fa-th-large"></i> DASHBOARD</a></li>
                <li><a href="#"><i class="fas fa-paper-plane"></i> MY FLIGHTS</a></li>
                <li><a href="#"><i class="fas fa-route"></i> ROUTE MAP</a></li>
                <li><a href="#"><i class="fas fa-cog"></i> SETTINGS</a></li>
            </ul>
            <a href="#" onclick="logout()" style="color: #666; text-decoration: none; font-size: 0.8rem; font-weight: bold; padding: 10px 18px;">
                <i class="fas fa-power-off"></i> LOGOUT
            </a>
        </nav>

        <main class="content">
            <header class="header-bar">
                <div>
                    <h1 style="font-weight: 800; font-size: 2rem;">Captain's Deck</h1>
                    <p style="color: #888;" id="currentDate"></p>
                </div>
                <div class="profile-snip">
                    <img id="userAvatar" class="avatar" src="https://via.placeholder.com/40" alt="Avatar">
                    <strong id="userName">User</strong>
                </div>
            </header>

            <div class="dashboard-grid">
                <div class="left-col">
                    <section class="card">
                        <div class="card-title">Flight Dispatch</div>
                        <form id="flightForm">
                            <div class="form-row">
                                <div class="input-group">
                                    <label>Departure ICAO</label>
                                    <input type="text" id="depIcao" placeholder="ENGM" required maxlength="4">
                                </div>
                                <div class="input-group">
                                    <label>Arrival ICAO</label>
                                    <input type="text" id="arrIcao" placeholder="ENBR" required maxlength="4">
                                </div>
                            </div>
                            <div class="form-row">
                                <div class="input-group">
                                    <label>Aircraft Type</label>
                                    <input type="text" id="aircraft" placeholder="B738" required>
                                </div>
                                <div class="input-group">
                                    <label>Callsign</label>
                                    <input type="text" id="callsign" placeholder="NAX123" required>
                                </div>
                            </div>
                            <button type="submit" class="btn-nas">File Flight Plan</button>
                        </form>
                    </section>

                    <section class="card">
                        <div class="card-title">Live Operations</div>
                        <table id="flightTable">
                            <thead>
                                <tr>
                                    <th>Callsign</th>
                                    <th>Route</th>
                                    <th>Aircraft</th>
                                    <th>Status</th>
                                </tr>
                            </thead>
                            <tbody id="flightBody">
                                </tbody>
                        </table>
                    </section>
                </div>

                <div class="right-col">
                    <section class="card" style="background: var(--nas-blue); color: white;">
                        <div class="card-title" style="color: white;">Career Overview</div>
                        <div style="margin-top: 2rem;">
                            <h3 style="font-size: 3rem; font-weight: 800;">142.8</h3>
                            <p style="opacity: 0.7; font-size: 0.8rem; letter-spacing: 1px;">TOTAL BLOCK HOURS</p>
                        </div>
                        <div style="margin-top: 2rem; display: flex; justify-content: space-between; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 1rem;">
                            <div>
                                <h4 id="flightCount">0</h4>
                                <p style="font-size: 0.6rem; opacity: 0.6;">FLIGHTS</p>
                            </div>
                            <div>
                                <h4>A+</h4>
                                <p style="font-size: 0.6rem; opacity: 0.6;">RANKING</p>
                            </div>
                        </div>
                    </section>
                </div>
            </div>
        </main>
    </div>

    <script>
        const CLIENT_ID = '1429242117506470019'; 
        const REDIRECT_URI = window.location.href.split('#')[0];
        
        // Update Date
        document.getElementById('currentDate').innerText = new Date().toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });

        function loginWithDiscord() {
            const url = `https://discord.com/api/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&response_type=token&scope=identify`;
            window.location.href = url;
        }

        window.onload = () => {
            const fragment = new URLSearchParams(window.location.hash.slice(1));
            const accessToken = fragment.get('access_token');

            if (accessToken) {
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('dashboardSection').style.display = 'grid';

                fetch('https://discord.com/api/users/@me', {
                    headers: { authorization: `Bearer ${accessToken}` }
                })
                .then(res => res.json())
                .then(user => {
                    document.getElementById('userName').innerText = user.username.toUpperCase();
                    if (user.avatar) {
                        document.getElementById('userAvatar').src = `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png`;
                    }
                });
                loadFlights();
            }
        };

        // Functional Flight Dispatch System
        document.getElementById('flightForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const flight = {
                callsign: document.getElementById('callsign').value.toUpperCase(),
                route: `${document.getElementById('depIcao').value.toUpperCase()} - ${document.getElementById('arrIcao').value.toUpperCase()}`,
                aircraft: document.getElementById('aircraft').value.toUpperCase(),
                status: 'EN ROUTE'
            };

            let flights = JSON.parse(localStorage.getItem('vnas_flights')) || [];
            flights.unshift(flight);
            localStorage.setItem('vnas_flights', JSON.stringify(flights));
            
            e.target.reset();
            loadFlights();
        });

        function loadFlights() {
            const flights = JSON.parse(localStorage.getItem('vnas_flights')) || [
                { callsign: 'NAX442', route: 'ENGM - ENBR', aircraft: 'B738', status: 'ARRIVED' }
            ];
            const body = document.getElementById('flightBody');
            body.innerHTML = '';
            
            flights.forEach(f => {
                body.innerHTML += `
                    <tr>
                        <td><strong>${f.callsign}</strong></td>
                        <td>${f.route}</td>
                        <td>${f.aircraft}</td>
                        <td><span class="status-badge">${f.status}</span></td>
                    </tr>
                `;
            });
            document.getElementById('flightCount').innerText = flights.length;
        }

        function logout() {
            window.location.href = REDIRECT_URI;
        }
    </script>
</body>
</html>
