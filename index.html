<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vNAS Hub | Norwegian Virtual Airline System</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-red: #e71c2a;
            --dark-blue: #15273f;
            --bg-white: #f8f9fa;
            --sidebar-width: 260px;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.08);
            --radius: 10px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-white); color: #333; overflow-x: hidden; }

        /* --- LOGIN SCREEN --- */
        #loginSection {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, var(--dark-blue) 0%, #1c3a5f 100%);
        }

        .login-card {
            background: white;
            padding: 3rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            text-align: center;
            width: 90%;
            max-width: 400px;
            border-top: 6px solid var(--primary-red);
        }

        .discord-btn {
            background-color: #5865F2;
            color: white;
            text-decoration: none;
            padding: 14px;
            border-radius: var(--radius);
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            border: none;
            width: 100%;
            font-size: 1rem;
        }

        /* --- DASHBOARD (Hidden by default) --- */
        #dashboardSection { display: none; grid-template-columns: var(--sidebar-width) 1fr; min-height: 100vh; }

        nav.sidebar { background-color: var(--dark-blue); color: white; padding: 2rem 1.5rem; display: flex; flex-direction: column; }
        .brand { font-size: 1.5rem; font-weight: bold; margin-bottom: 3rem; }
        .brand span { color: var(--primary-red); }

        .nav-links { list-style: none; flex-grow: 1; }
        .nav-links a { color: #bdc3c7; text-decoration: none; padding: 12px 15px; display: flex; align-items: center; gap: 12px; border-radius: var(--radius); margin-bottom: 5px; }
        .nav-links a.active, .nav-links a:hover { background: rgba(255,255,255,0.1); color: white; }

        .content { padding: 2rem; max-width: 1200px; margin: 0 auto; width: 100%; }
        .header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }

        .profile-snip { display: flex; align-items: center; gap: 12px; background: white; padding: 8px 16px; border-radius: 50px; box-shadow: var(--shadow); }
        .avatar { width: 35px; height: 35px; border-radius: 50%; background: #eee; object-fit: cover; }

        .dashboard-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; }
        .card { background: white; border-radius: var(--radius); padding: 1.5rem; box-shadow: var(--shadow); margin-bottom: 20px; }
        .card-title { font-weight: bold; margin-bottom: 1.2rem; border-left: 4px solid var(--primary-red); padding-left: 10px; color: var(--dark-blue); }

        input, select, .btn-primary { width: 100%; padding: 10px; margin-top: 5px; border-radius: 6px; border: 1px solid #ddd; }
        .btn-primary { background: var(--primary-red); color: white; border: none; font-weight: bold; cursor: pointer; margin-top: 15px; }

        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; color: #777; font-size: 0.8rem; padding: 10px; border-bottom: 1px solid #eee; }
        td { padding: 12px 10px; border-bottom: 1px solid #f9f9f9; }

        @media (max-width: 900px) { #dashboardSection { grid-template-columns: 1fr; } .sidebar { display: none; } .dashboard-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div id="loginSection">
        <div class="login-card">
            <h1 style="color: var(--dark-blue); font-size: 2.5rem;">vNAS <span style="color:var(--primary-red)">Hub</span></h1>
            <p style="margin-bottom: 2rem; color: #666;">Norwegian Virtual Airline System</p>
            <button class="discord-btn" onclick="loginWithDiscord()">
                <i class="fab fa-discord"></i> Login with Discord
            </button>
        </div>
    </div>

    <div id="dashboardSection">
        <nav class="sidebar">
            <div class="brand">vNAS <span>Hub</span></div>
            <ul class="nav-links">
                <li><a href="#" class="active"><i class="fas fa-home"></i> Dashboard</a></li>
                <li><a href="#"><i class="fas fa-plane"></i> Flights</a></li>
                <li><a href="#"><i class="fas fa-map-marked-alt"></i> Planning</a></li>
            </ul>
            <a href="#" onclick="logout()" style="color: #ff7675; text-decoration: none; font-size: 0.9rem;"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </nav>

        <main class="content">
            <header class="header-bar">
                <h2 id="welcomeText">Welcome, Captain</h2>
                <div class="profile-snip">
                    <img id="userAvatar" class="avatar" src="" alt="">
                    <strong id="userName">Loading...</strong>
                </div>
            </header>

            <div class="dashboard-grid">
                <div class="left-col">
                    <section class="card">
                        <div class="card-title">Register Flight</div>
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                            <input type="text" placeholder="DEP ICAO (e.g. ENGM)">
                            <input type="text" placeholder="ARR ICAO (e.g. ENBR)">
                        </div>
                        <button class="btn-primary">File Flight Plan</button>
                    </section>

                    <section class="card">
                        <div class="card-title">Recent Flights</div>
                        <table>
                            <thead><tr><th>Route</th><th>Status</th></tr></thead>
                            <tbody>
                                <tr><td><strong>ENGM - ENBR</strong></td><td><span style="color: green;">● Completed</span></td></tr>
                                <tr><td><strong>ENGM - EGKK</strong></td><td><span style="color: orange;">● Scheduled</span></td></tr>
                            </tbody>
                        </table>
                    </section>
                </div>

                <div class="right-col">
                    <section class="card" style="text-align: center;">
                        <div class="card-title">Your Stats</div>
                        <div style="font-size: 2rem; font-weight: bold; color: var(--primary-red);">12.5</div>
                        <p style="font-size: 0.7rem; text-transform: uppercase;">Flight Hours</p>
                    </section>
                </div>
            </div>
        </main>
    </div>

    <script>
        // CONFIGURATION: Replace these with your own from Discord Developer Portal
        const CLIENT_ID = '1429242117506470019'; 
        const REDIRECT_URI = window.location.href.split('#')[0]; // Auto-detects current page

        function loginWithDiscord() {
            // This URL opens the Discord OAuth2 screen
            const url = `https://discord.com/api/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&response_type=token&scope=identify`;
            window.location.href = url;
        }

        window.onload = () => {
            const fragment = new URLSearchParams(window.location.hash.slice(1));
            const accessToken = fragment.get('access_token');

            if (accessToken) {
                // We have a token! Show dashboard and fetch user data
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('dashboardSection').style.display = 'grid';

                fetch('https://discord.com/api/users/@me', {
                    headers: { authorization: `Bearer ${accessToken}` }
                })
                .then(res => res.json())
                .then(user => {
                    document.getElementById('userName').innerText = user.username;
                    document.getElementById('welcomeText').innerText = `Welcome Back, ${user.username}`;
                    if (user.avatar) {
                        document.getElementById('userAvatar').src = `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png`;
                    }
                })
                .catch(err => console.error("Error fetching user:", err));
            }
        };

        function logout() {
            window.location.href = REDIRECT_URI; // Refresh and clear token from URL
        }
    </script>
</body>
</html>
